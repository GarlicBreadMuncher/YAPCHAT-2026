<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YapChat — Chat with @{{ partner }}</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.8.1/socket.io.js"
    integrity="sha512-8BHxHDLsOHx+flIrQ0DrZcea7MkHqRU5GbTHmbdzMRnAaoCIkZ97PqZcXJkKZckMMhqfoeaJE+DNUVuyoQsO3Q=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <span class="navbar-brand">YapChat</span>
    <div class="navbar-links">
      <a href="/browse" class="btn btn-secondary btn-sm">← Browse</a>
      <a href="/settings" class="btn btn-secondary btn-sm">Settings</a>
    </div>
  </nav>

  <div class="chat-layout">
    <!-- Chat header -->
    <div class="chat-header">
      <div class="user-avatar" style="width:40px;height:40px;font-size:1rem;">
        {{ partner[0].upper() }}
      </div>
      <div>
        <div style="font-family:var(--font-head);font-weight:700;">@{{ partner }}</div>
        <div style="font-size:.8rem;color:var(--muted);">Private conversation</div>
      </div>
    </div>

    <!-- Messages -->
    <div class="chat-messages" id="messages">
      {% for msg in history %}
      <div class="msg {{ 'me' if msg.sender == current_user else 'them' }}">
        <span class="msg-sender">@{{ msg.sender }}</span>
        <div class="msg-bubble">{{ msg.text }}</div>
      </div>
      {% endfor %}
    </div>

    <!-- Input -->
    <div class="chat-input-area">
      <input type="text" class="chat-input" id="messageInput" placeholder="Type a message…" autocomplete="off">
      <button class="send-btn" id="sendBtn" title="Send">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    const ME      = "{{ current_user }}";
    const ROOM    = "{{ room }}";
    const socket  = io.connect("http://localhost:5000");
    const msgsEl  = document.getElementById('messages');
    const input   = document.getElementById('messageInput');

    socket.on('connect', () => socket.emit('join', { room: ROOM }));

    socket.on('message', (data) => {
      appendMessage(data.sender, data.text);
    });

    function appendMessage(sender, text) {
      const isMe = sender === ME;
      const div  = document.createElement('div');
      div.className = 'msg ' + (isMe ? 'me' : 'them');
      div.innerHTML = `
        <span class="msg-sender">@${sender}</span>
        <div class="msg-bubble">${escHtml(text)}</div>
      `;
      msgsEl.appendChild(div);
      msgsEl.scrollTop = msgsEl.scrollHeight;
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function sendMessage() {
      const text = input.value.trim();
      if (!text) return;
      socket.emit('message', { room: ROOM, sender: ME, text });
      input.value = '';
    }

    document.getElementById('sendBtn').addEventListener('click', sendMessage);
    input.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) sendMessage(); });

    // Scroll to bottom on load
    msgsEl.scrollTop = msgsEl.scrollHeight;
  </script>
</body>
</html>
