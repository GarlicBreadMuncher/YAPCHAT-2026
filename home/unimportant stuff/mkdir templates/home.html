<!DOCTYPE html>
<html lang="en">
    
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome To YapChat!</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>

    body {
      background-image: url("../../static/gallery/yellow monkey yapchat.png");
      background-repeat: no-repeat;     /* Prevents image repetition */
      background-size: cover;           /* Scales image to cover the entire background */
      background-attachment: fixed;     /* Keeps image fixed during scrolling */
    }


    .floating-cards {
      position: absolute; inset: 0; pointer-events: none; overflow: hidden; /* Decorative floating cards */
    }
    .fc {
      position: absolute; background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: .75rem 1.1rem; font-size: .8rem;
      display: flex; align-items: center; gap: .5rem; opacity: .6;
      animation: float 6s ease-in-out infinite;
    }
    .fc .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); } /* set at different timings to create a more dynamic aesthetic */
    .fc-1 { top: 15%; left: 5%;  animation-delay: 0s; }
    .fc-2 { top: 65%; left: 2%;  animation-delay: 1.5s; }
    .fc-3 { top: 20%; right: 4%; animation-delay: .8s; }
    .fc-4 { top: 70%; right: 6%; animation-delay: 2.2s; }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-12px); }
    }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="floating-cards">
    <div class="fc fc-1"><div class="dot"></div> Meet new people with similar interests!</div>
    <div class="fc fc-2"><div class="dot"></div> Chat with your buddies</div>
    <div class="fc fc-3"><div class="dot"></div> </div>
    <div class="fc fc-4"><div class="dot"></div> New message from kai</div>
  </div>

  <div class="page-center">
    <div class="hero">
      <div class="anim">
        <div class="logo-mark">
          <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
        </div>
      </div>
      <h1 class="anim anim-d1">WELCOME TO<br><span>YAPCHAT</span></h1>
      <p class="anim anim-d2">YapChat is a private messaging space where you find interesting people, connect over shared interests, and have real conversations.</p>
      <div class="cta-group anim anim-d3">
        <a href="/create-account" class="btn btn-primary">Create Account</a>
        <a href="/login"          class="btn btn-secondary">Log In</a>
      </div>
    </div>
  </div>
</body>
</html>
