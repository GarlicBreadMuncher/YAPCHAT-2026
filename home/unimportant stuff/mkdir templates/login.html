<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YapChat — Login</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .back-link { display: inline-flex; align-items: center; gap: .4rem; font-size: .875rem; color: var(--muted); margin-bottom: 1.5rem; }
    .back-link:hover { color: var(--text); }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="page-center">
    <div class="form-box">
      <a href="/static" class="back-link anim">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        Back
      </a>
      <div class="card anim anim-d1">
        <div>
          <h2>Welcome back</h2>
          <p style="margin-top:.4rem;font-size:.9rem;">Log in to continue your conversations</p>
        </div>

        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">
          <div style="display:flex;flex-direction:column;gap:1rem;">
            <div class="field">
              <label for="username">Username</label>
              <input type="text" id="username" name="username" placeholder="your_handle" required autofocus>
            </div>
            <div class="field">
              <label for="password">Password</label>
              <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block" style="margin-top:.5rem;">Log In →</button>
          </div>
        </form>

        <p style="text-align:center;font-size:.875rem;">No account yet? <a href="/create-account">Create one</a></p>
      </div>
    </div>
  </div>
</body>
</html>
