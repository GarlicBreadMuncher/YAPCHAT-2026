<!DOCTYPE html>
<html lang="en">
    
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome To YapChat!</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>

    body {
      background-image: url("static/gallery/yellow monkey yapchat.png");
      background-repeat: no-repeat;     /* Prevents image repetition */
      background-size: cover;           /* Scales image to cover the entire background */
      background-attachment: fixed;     /* Keeps image fixed during scrolling */
    }

  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  

  <div class="page-center">
    <div class="hero">
      <div class="anim">
        <div class="logo-mark">
          <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
        </div>
      </div>
      <h1 class="anim anim-d1">WELCOME TO<br><span>YAPCHAT</span></h1>
      <p class="anim anim-d2">YapChat is a private messaging space where you find interesting people, connect over shared interests, and have real conversations.</p>
      <div class="cta-group anim anim-d3">
        <a href="/create-account" class="btn btn-primary">Create Account</a>
        <a href="/login"          class="btn btn-secondary">Log In</a>
      </div>
    </div>
  </div>
</body>
</html>
