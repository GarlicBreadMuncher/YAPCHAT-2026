<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YapChat — Create Account</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    .tag-suggestions { display: flex; flex-wrap: wrap; gap: .4rem; margin-top: .5rem; }
    .tag-pill {
      background: var(--bg); border: 1px solid var(--border); border-radius: 20px;
      font-size: .75rem; padding: .25rem .75rem; cursor: pointer; color: var(--muted);
      transition: all .15s;
    }
    .tag-pill:hover, .tag-pill.selected {
      background: rgba(124,106,247,.12); border-color: var(--accent); color: var(--accent);
    }
    .back-link { display: inline-flex; align-items: center; gap: .4rem; font-size: .875rem; color: var(--muted); margin-bottom: 1.5rem; }
    .back-link:hover { color: var(--text); }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="page-center">
    <div class="form-box">
      <a href="/" class="back-link anim">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        Back
      </a>
      <div class="card anim anim-d1">
        <div>
          <h2>Create account</h2>
          <p style="margin-top:.4rem;font-size:.9rem;">Set up your profile and start connecting.</p>
        </div>

        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/create-account">         <!-- creating account function. username, password, tags -->
          <div style="display:flex;flex-direction:column;gap:1rem;">
            <div class="field">
              <label for="username">Username</label>
              <input type="text" id="username" name="username" placeholder="your_username" required>
            </div>
            <div class="field">
              <label for="password">Password</label>
              <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            <div class="field">
              <label for="bio">Bio <span style="color:var(--muted);font-size:.75em;text-transform:none;letter-spacing:0">(optional)</span></label>
              <textarea id="bio" name="bio" placeholder="Tell people a little about yourself…"></textarea>
            </div>
            <div class="field">
              <label>Interests / Tags</label>
              <input type="text" id="tags" name="tags" placeholder="music, coding, art, gaming…">
              <div class="tag-suggestions">
                {% for tag in ['music','art','coding','gaming','travel','film','books','design','sports','food','science','photography'] %}
                <span class="tag-pill" onclick="addTag('{{ tag }}')">{{ tag }}</span>
                {% endfor %}
              </div>
            </div>
            <button type="submit" class="btn btn-primary btn-block" style="margin-top:.5rem;">Create Account →</button>
          </div>
        </form>

        <p style="text-align:center;font-size:.875rem;">Already have an account? <a href="/login">Log in</a></p> <!-- button to go login-->
      </div>
    </div>
  </div>

  <script>                                                      /* adds clickable tags into the text which are added to the users account when toggled unless already typed in the tags list + are highlighted when clicked */
    const tagsInput = document.getElementById('tags');
    document.querySelectorAll('.tag-pill').forEach(pill => {
      pill.addEventListener('click', () => {
        const tag = pill.textContent.trim();
        const current = tagsInput.value.split(',').map(t => t.trim()).filter(Boolean);
        if (current.includes(tag)) {
          tagsInput.value = current.filter(t => t !== tag).join(', ');
          pill.classList.remove('selected');
        } else {
          current.push(tag);
          tagsInput.value = current.join(', ');
          pill.classList.add('selected');
        }
      });
    });
    function addTag(tag) { /* handled by click above */ }/*mmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmm */
  </script>
</body>
</html>
